---
- name: Deploy nodeec251
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    app_port: 3000
    project: 'nodeec251'
    web_server: 'nginx'
    node_version: '20 (default)'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # ── Node.js runtime ───────────────────────────────────────────────────────
    - name: Install Node.js {{ node_version }}
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
        apt-get install -y nodejs
      args:
        executable: /bin/bash

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes

    # ── Local database installation ───────────────────────────────────────────
    - name: Install PostgreSQL server
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present
        update_cache: yes

    - name: Ensure PostgreSQL is started
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Wait for PostgreSQL to be ready
      wait_for:
        port: 5432
        host: 127.0.0.1
        timeout: 60

    - name: Create PostgreSQL database and user
      shell: |
        DB_NAME="{{ lookup('env', 'DB_NAME') | default(project | replace('-', '_') + 'db', true) }}"
        DB_USER="{{ lookup('env', 'DB_USERNAME') | default('appuser', true) }}"
        DB_PASS="{{ lookup('env', 'DB_PASSWORD') | default('apppass', true) }}"
        sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 \
          || sudo -u postgres psql -c "CREATE DATABASE \"$DB_NAME\";"
        sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 \
          || sudo -u postgres psql -c "CREATE USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
        sudo -u postgres psql -c "ALTER USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE \"$DB_NAME\" TO \"$DB_USER\";"
        sudo -u postgres psql -c "ALTER DATABASE \"$DB_NAME\" OWNER TO \"$DB_USER\";"
      args:
        executable: /bin/bash

    # ── Web server (nginx / apache / none) ────────────────────────────────────
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent


    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: preserve
      notify: Restart app

    - name: Install Node dependencies
      npm:
        path: "{{ app_dir }}"
        production: yes

    - name: Create .env file
      shell: |
        printf '' > {{ app_dir }}/.env
        DB_USER="{{ lookup('env', 'DB_USERNAME') | default('appuser', true) }}"
        DB_PASS="{{ lookup('env', 'DB_PASSWORD') | default('', true) }}"
        DB_NAME="{{ lookup('env', 'DB_NAME') | default(project | replace('-', '_') + 'db', true) }}"
        printf 'DATABASE_URL=postgresql://%s:%s@localhost:5432/%s\n' "$DB_USER" "$DB_PASS" "$DB_NAME" >> {{ app_dir }}/.env
        printf 'PORT={{ app_port }}\nNODE_ENV=production\n' >> {{ app_dir }}/.env
      args:
        executable: /bin/bash

    - name: Start app with PM2
      shell: |
        cd {{ app_dir }}
        pm2 delete app 2>/dev/null || true
        pm2 start server.js --name app --update-env
        pm2 save
        pm2 startup systemd -u root --hp /root | tail -1 | bash || true
      args:
        executable: /bin/bash

    - name: Reload and start web server
      service:
        name: "{{ web_server if web_server not in ('none', 'skip', 'no', '') else 'nginx' }}"
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      shell: |
        cd {{ app_dir }} && pm2 restart app --update-env 2>/dev/null || true
      args:
        executable: /bin/bash
